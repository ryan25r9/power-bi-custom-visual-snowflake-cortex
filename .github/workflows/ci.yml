name: CI

# Runs the build gates on every PR and feature-branch push so a broken build
# never merges unnoticed. main is PR-only by convention (not server-enforced on
# the free plan), so these checks are advisory-but-visible: glance at them before
# merging. If the repo ever moves to GitHub Pro, mark "gates" as a required check
# and it enforces automatically.

on:
  pull_request:
  push:
    branches-ignore: [main]   # main only lands via PR; the PR event already covers it

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether code paths changed so docs-only PRs skip the build cheaply
  # while still reporting a green status (ready to be "required" later).
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'visual/**'
              - 'proxy/**'
              - 'snowflake/**'
              - 'tests/**'
              - 'tools/**'
              - '.github/workflows/ci.yml'

  # The three gates from CLAUDE.md.
  gates:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip if no code changes
        if: needs.changes.outputs.code != 'true'
        run: echo "No code paths changed — gate passes trivially."
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.code == 'true'
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            proxy/package-lock.json
            visual/package-lock.json
      # proxy deps first — tests/run-tests.sh AND tools/run-e2e.sh both compile
      # with proxy/node_modules/.bin/tsc.
      - name: Install proxy deps
        if: needs.changes.outputs.code == 'true'
        working-directory: proxy
        run: npm ci
      - name: Install visual deps
        if: needs.changes.outputs.code == 'true'
        working-directory: visual
        run: npm ci
      - name: Gate 1 — unit tests
        if: needs.changes.outputs.code == 'true'
        run: bash tests/run-tests.sh
      - name: Gate 2 — mock-Snowflake to proxy E2E
        if: needs.changes.outputs.code == 'true'
        run: bash tools/run-e2e.sh
      # pbiviz package is headless — it never needs the dev certificate that
      # `pbiviz start` does.
      - name: Gate 3 — pbiviz package
        if: needs.changes.outputs.code == 'true'
        working-directory: visual
        run: ./node_modules/.bin/pbiviz package
