name: Auto-merge Claude PRs

# Convenience for PRs opened by the maintainer's automated Claude runs ONLY.
# Any PR whose head branch starts with `claude/` or `briefs/` gets converted
# from draft (if applicable) and squash-merged with branch deletion.
#
# Scope: this is the MAINTAINER's own automation on the root (Phase 2) area.
# The second developer's branches (phase1/*, fix/*, etc.) are NOT matched here —
# they follow the reviewed branch -> PR -> merge flow in CONTRIBUTING.md. Glance
# at the CI checks before merging; if the repo moves to GitHub Pro, switch the
# merge step to `--auto` alone so it waits for required checks.

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    if: >
      startsWith(github.head_ref, 'claude/') ||
      startsWith(github.head_ref, 'briefs/')
    runs-on: ubuntu-latest
    steps:
      - name: Mark ready (if draft)
        if: github.event.pull_request.draft == true
        run: gh pr ready "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Squash-merge (auto if available, else immediate)
        # Native auto-merge needs a public repo or a paid plan; this repo is
        # private/free, so fall back to an immediate squash-merge when --auto
        # is unavailable. Works identically once the repo goes public/Pro.
        run: gh pr merge --squash --auto --delete-branch "$PR_URL" || gh pr merge --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
